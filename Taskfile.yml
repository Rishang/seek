version: 3

tasks:
  build:
    desc: Build the seek binary
    dir: src
    cmds:
      - go build -o ../bin/seek .

  run:
    desc: Build and run with args (e.g. task run -- search "query")
    dir: src
    cmds:
      - go run . {{.CLI_ARGS}}

  test:
    desc: Run all tests
    dir: src
    cmds:
      - go test ./...

  test:watch:
    desc: Run tests on file changes
    dir: src
    cmds:
      - go run github.com/cespare/reflex -r '\.go$' -- go test ./...

  vet:
    desc: Run go vet
    dir: src
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    dir: src
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    dir: src
    cmds:
      - go fmt ./...

  tidy:
    desc: Tidy module dependencies
    dir: src
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
