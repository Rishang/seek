version: 3

tasks:
  build:
    desc: Build the seek binary
    dir: src
    cmds:
      - go build -o ../bin/seek .

  build:release:
    desc: Cross-compile a stripped release binary (pass GOOS, GOARCH; VERSION from GITHUB_REF_NAME in CI)
    dir: src
    requires:
      vars: [GOOS, GOARCH]
    vars:
      EXT: '{{if eq .GOOS "windows"}}.exe{{end}}'
      OUTPUT: '../dist/seek-{{.GOOS}}-{{.GOARCH}}{{.EXT}}'
      # Precedence: explicit VERSION > GITHUB_REF_NAME (the tag on a CI tag-push) > dev.
      VERSION: '{{.VERSION | default .GITHUB_REF_NAME | default "dev"}}'
    env:
      CGO_ENABLED: '0'
      GOOS: '{{.GOOS}}'
      GOARCH: '{{.GOARCH}}'
    cmds:
      - go build -trimpath -ldflags "-s -w -X main.version={{.VERSION}}" -o "{{.OUTPUT}}" .

  run:
    desc: Build and run with args (e.g. task run -- search "query")
    dir: src
    cmds:
      - go run . {{.CLI_ARGS}}

  test:
    desc: Run all tests
    dir: src
    cmds:
      - go test ./...

  test:watch:
    desc: Run tests on file changes
    dir: src
    cmds:
      - go run github.com/cespare/reflex -r '\.go$' -- go test ./...

  vet:
    desc: Run go vet
    dir: src
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    dir: src
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    dir: src
    cmds:
      - go fmt ./...

  tidy:
    desc: Tidy module dependencies
    dir: src
    cmds:
      - go mod tidy

  docker:build:
    desc: Build the Docker image
    vars:
      DOCKER_IMAGE: '{{.DOCKER_IMAGE | default "rishang/seek"}}'
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker build -t '{{.DOCKER_IMAGE}}:{{.TAG}}' .

  docker:push:
    desc: Build and push the Docker image to DockerHub
    vars:
      DOCKER_IMAGE: '{{.DOCKER_IMAGE | default "rishang/seek"}}'
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - task: docker:build
      - docker push '{{.DOCKER_IMAGE}}:{{.TAG}}'

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
