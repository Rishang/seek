<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <circle cx="512" cy="512" r="480" fill="#171a26"/>
  <circle cx="512" cy="512" r="480" fill="none" stroke="#4d4f60" stroke-width="12"/>

  <!-- Ears -->
  <circle cx="305" cy="258" r="70" fill="#f5f5f7"/>
  <circle cx="719" cy="258" r="70" fill="#f5f5f7"/>

  <circle cx="305" cy="258" r="42" fill="#f7c0ca"/>
  <circle cx="719" cy="258" r="42" fill="#f7c0ca"/>

  <!-- Face -->
  <ellipse cx="512" cy="525" rx="315" ry="280" fill="#f5f5f7"/>

  <!-- Left stripe -->
  <path d="
    M395 245
    C320 280 270 360 270 500
    C270 610 315 700 395 770
    C455 650 460 390 395 245
    Z"
    fill="#1a1a20"/>

  <!-- Right stripe -->
  <path d="
    M629 245
    C704 280 754 360 754 500
    C754 610 709 700 629 770
    C569 650 564 390 629 245
    Z"
    fill="#1a1a20"/>

  <!-- Eyes -->
  <circle cx="430" cy="520" r="60" fill="#fff"/>
  <circle cx="594" cy="520" r="60" fill="#fff"/>

  <circle cx="430" cy="530" r="42" fill="#111"/>
  <circle cx="594" cy="530" r="42" fill="#111"/>

  <circle cx="455" cy="495" r="18" fill="#fff"/>
  <circle cx="619" cy="495" r="18" fill="#fff"/>

  <circle cx="415" cy="570" r="10" fill="#fff"/>
  <circle cx="579" cy="570" r="10" fill="#fff"/>

  <!-- Blush -->
  <ellipse cx="305" cy="625" rx="55" ry="32" fill="#f8bcc7"/>
  <ellipse cx="719" cy="625" rx="55" ry="32" fill="#f8bcc7"/>

  <!-- Blush highlights -->
  <rect x="285" y="610" width="8" height="24" rx="4" fill="#fff" transform="rotate(25 289 622)"/>
  <rect x="315" y="610" width="8" height="24" rx="4" fill="#fff" transform="rotate(10 319 622)"/>
  <rect x="345" y="610" width="8" height="24" rx="4" fill="#fff" transform="rotate(-10 349 622)"/>

  <rect x="671" y="610" width="8" height="24" rx="4" fill="#fff" transform="rotate(10 675 622)"/>
  <rect x="701" y="610" width="8" height="24" rx="4" fill="#fff" transform="rotate(-10 705 622)"/>
  <rect x="731" y="610" width="8" height="24" rx="4" fill="#fff" transform="rotate(-25 735 622)"/>

  <!-- Nose -->
  <ellipse cx="512" cy="665" rx="52" ry="38" fill="#111"/>

  <ellipse cx="490" cy="650" rx="16" ry="10" fill="#fff"/>

  <!-- Smile -->
  <path
    d="M470 760 Q512 800 554 760"
    fill="none"
    stroke="#111"
    stroke-width="14"
    stroke-linecap="round"
  />
