<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="seek badger logo">
  <title>seek</title>

  <!-- backing disc: charcoal with a subtle ring so it reads on light and dark -->
  <circle cx="120" cy="120" r="112" fill="#17171b"/>
  <circle cx="120" cy="120" r="112" fill="none" stroke="#3a3a42" stroke-width="3"/>

  <!-- ears -->
  <circle cx="80" cy="70" r="15" fill="#cfd2d8"/>
  <circle cx="160" cy="70" r="15" fill="#cfd2d8"/>
  <circle cx="80" cy="70" r="7" fill="#17171b"/>
  <circle cx="160" cy="70" r="7" fill="#17171b"/>

  <!-- white face -->
  <path d="M120 56
           C151 56 169 74 169 102
           C169 142 146 178 120 191
           C94 178 71 142 71 102
           C71 74 89 56 120 56 Z"
        fill="#f4f5f7"/>

  <!-- badger eye-stripes (the signature) -->
  <path d="M93 60 C84 60 78 71 80 90 C82 114 88 137 101 151
           C109 138 111 111 108 86 C107 68 101 60 93 60 Z" fill="#17171b"/>
  <path d="M147 60 C156 60 162 71 160 90 C158 114 152 137 139 151
           C131 138 129 111 132 86 C133 68 139 60 147 60 Z" fill="#17171b"/>

  <!-- eyes set inside the stripes -->
  <circle cx="94" cy="100" r="5.5" fill="#f4f5f7"/>
  <circle cx="146" cy="100" r="5.5" fill="#f4f5f7"/>

  <!-- nose -->
  <path d="M120 150 C133 150 135 161 126 169 C122 173 118 173 114 169
           C105 161 107 150 120 150 Z" fill="#17171b"/>
</svg>
